<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herdentity | Confidence Rooted in Identity</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Polyfill for process.env to prevent crashes in the browser
    window.process = window.process || { env: { API_KEY: '' } };

    tailwind.config = {
      theme: {
        extend: {
          colors: {
            royal: '#a80dc2',
            'royal-hover': '#8a0a9f',
            lavender: '#f5e1ff',
            gold: '#C5A059',
            'gold-light': '#E5C48B',
            zinc: {
              950: '#09090b',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Instrument Serif', 'serif'],
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            'scroll': 'scroll 40s linear infinite',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            scroll: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            }
          }
        },
      },
    }
  </script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Custom scrollbar to match the minimal aesthetic */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: #e4e4e7;
      border-radius: 20px;
    }

    .fade-mask {
      mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/": "https://esm.sh/react@18.3.1/",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "react-dom/": "https://esm.sh/react-dom@18.3.1/",
        "framer-motion": "https://esm.sh/framer-motion@11.0.8?deps=react@18.3.1",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.3.1",
        "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.21.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-white text-zinc-600 antialiased selection:bg-royal selection:text-white">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
